name: Deploy VitePress docs

# Trigger on every push to master that touches docs/ (or this workflow file
# itself). Manual run via the Actions tab is also wired up for re-deploys
# without code changes.
on:
    push:
        branches: [master]
        paths:
            - 'docs/**'
            - '.github/workflows/docs-deploy.yml'
    workflow_dispatch:

# GitHub Pages deploy needs these permissions on the job's GITHUB_TOKEN.
permissions:
    contents: read
    pages: write
    id-token: write

# Single in-flight deploy at a time. A newer push cancels an in-progress
# build so the latest content always wins the race.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0  # Full history so VitePress' "last updated" timestamps work.

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install
              run: npm ci

            - name: Build VitePress
              run: npm run docs:build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/.vitepress/dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
