sections:
  general:
    display: General
    fields:
      - handle: multisite_note
        field:
          type: html
          # V1.2 Cross-Tab-F — sprach-agnostisches Banner. Linkwise's
          # Settings are global by design; per-site overrides for
          # `collections`, `custom_stopwords`, `excluded_entries` are
          # tracked for V1.3 (see docs/POST_MULTILANG_GAPS.md M2/M3/H1).
          html: '<div class="text-xs text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800/60 rounded-md px-3 py-2 leading-relaxed"><strong>Settings affect all sites.</strong> On multisite installs, per-site overrides for collections, stopwords, and excluded entries are planned for V1.3. Until then this page is global — per-entry locale-scoping (introduced in v1.2) still works correctly across all sites without changing anything here.</div>'

      - handle: language
        field:
          type: select
          display: 'Content language (fallback)'
          clearable: true
          instructions: |
            Drives stop-word filtering, stemming, and keyword extraction. Leave empty to auto-detect from Statamic's site locale. "Confident" languages support inflected matching (plurals, conjugations); "Limited" languages match exact word forms only.

            **Single-site installs**: this is the primary content-language source. Pick the language your content is written in.

            **Multisite installs**: this setting is essentially inactive. Linkwise reads each entry's site `lang:` declaration directly and stems per-entry. The only edge case it covers is a site that has `locale:` but no `lang:` declared in `sites.yaml` — extremely rare in modern Statamic. If your sites.yaml declares `lang:` on every site (the default since Statamic 5), this field has no effect on your suggestion quality.

            _Affects the NLP pipeline on single-site installs — run **Scan Content** (header button) after changing this for the new language to take effect._
          options:
            en: 'English (Confident)'
            de: 'German (Confident)'
            fr: 'French (Confident)'
            es: 'Spanish (Confident)'
            it: 'Italian (Confident)'
            nl: 'Dutch (Confident)'
            pt: 'Portuguese (Confident)'
            sv: 'Swedish (Confident)'
            da: 'Danish (Confident)'
            'no': 'Norwegian (Confident)'
            fi: 'Finnish (Confident)'
            ro: 'Romanian (Confident)'
            ru: 'Russian (Confident)'
            ca: 'Catalan (Confident)'
            hu: 'Hungarian (Limited — exact-match only)'
            pl: 'Polish (Limited — exact-match only)'
            cs: 'Czech (Limited — exact-match only)'
            sk: 'Slovak (Limited — exact-match only)'
            sl: 'Slovenian (Limited — exact-match only)'
            hr: 'Croatian (Limited — exact-match only)'
            bg: 'Bulgarian (Limited — exact-match only)'
            uk: 'Ukrainian (Limited — exact-match only)'
            lv: 'Latvian (Limited — exact-match only)'
            lt: 'Lithuanian (Limited — exact-match only)'
            et: 'Estonian (Limited — exact-match only)'
            ga: 'Irish (Limited — exact-match only)'
            el: 'Greek (Limited — sentence-boundary edge case)'
            tr: 'Turkish (Limited — case-sensitivity edge case)'
          width: 50

      - handle: collections
        field:
          type: collections
          display: Collections to Index
          instructions: "Which collections should Linkwise index for suggestions? Leave empty to index all collections. Takes effect after re-scanning content."
          mode: select
          max_items: null
          width: 50

      - handle: target_collections
        field:
          type: collections
          display: Target Collections
          instructions: "Which collections should suggestions point TO? Leave empty for same as indexed collections. _Run **Scan Content** after changing this so the Links Report counts reflect the new target scope._"
          mode: select
          max_items: null
          width: 50

      - handle: entry_status
        field:
          type: select
          display: Entry Status
          instructions: "Which entries to include in the index. Takes effect after re-scanning content."
          options:
            published: "Published only"
            all: "All entries (including drafts)"
          default: published
          width: 50

      - handle: max_suggestions
        field:
          type: integer
          display: Max Outbound Suggestions per Entry
          instructions: |
            Caps how many outbound suggestions the engine returns per entry. Affects the **Outbound Suggestion Modal**, the **outbound count badge** in the Links Report table, and the **sidebar suggestion panel** in the entry editor.

            Does **not** affect inbound suggestion counts (those are computed unlimited so the inbound-badge in the Links Report shows true totals).

            **Default 10** is a sane editorial limit — bump to 50–100 if you want every borderline match visible. Higher values mean slightly slower modal loads but more thorough suggestion lists.

            _Run **Scan Content** after changing this so the Outbound count badges in Links Report match the new cap. Suggestion modals update live._
          default: 10
          min: 1
          max: 200
          validate:
            - 'integer'
            - 'min:1'
            - 'max:200'
          width: 50

      - handle: open_in_new_tab
        field:
          type: toggle
          display: Open Links in New Tab
          instructions: "Add target=\"_blank\" to inserted links."
          default: false
          width: 50

  matching:
    display: Matching
    fields:
      - handle: min_phrase_words
        field:
          type: integer
          display: Minimum Phrase Words
          instructions: "Minimum number of words a title phrase must have to be considered a match. _Run **Scan Content** after changing this so the Links Report counts reflect the new threshold._"
          default: 2
          min: 1
          max: 10
          validate:
            - 'integer'
            - 'min:1'
            - 'max:10'
          width: 50

      - handle: min_score
        field:
          type: float
          display: Minimum Title Match Score
          instructions: "Minimum relevance score (0.0 – 1.0) for title-based suggestions. Higher = fewer but better matches. _Run **Scan Content** after changing this so the Links Report counts reflect the new threshold. Suggestion modals update live._"
          default: 0.4
          min: 0
          max: 1
          step: 0.05
          validate:
            - 'numeric'
            - 'min:0'
            - 'max:1'
          width: 50

      - handle: max_keywords_per_entry
        field:
          type: integer
          display: Max Keywords per Entry
          instructions: "Maximum TF-IDF keywords to extract per entry. _Affects what's extracted at scan-time — run **Scan Content** after changing this for the new cap to take effect._"
          default: 20
          min: 1
          max: 100
          validate:
            - 'integer'
            - 'min:1'
            - 'max:100'
          width: 50

      - handle: prevent_two_way
        field:
          type: toggle
          display: Prevent Two-Way Linking
          instructions: |
            If entry A already links to entry B, don't suggest linking B → A.

            **Why this exists**: reciprocal links are a known SEO anti-pattern. Google's link-equity model gives less weight to A↔B link pairs because they look like exchange-link schemes. Enable this if you're optimising for link-equity distribution across a content cluster.

            Leave OFF if your site is small enough that mutual references are a natural editorial signal (most sites). Default off.

            _Run **Scan Content** after changing this so the Links Report counts reflect the new filter._
          default: false
          width: 50

  exclusions:
    display: Exclusions
    fields:
      - handle: excluded_entries
        field:
          type: entries
          display: Exclude Entries
          instructions: "These entries will be excluded from all suggestions (neither suggested nor suggesting). _Run **Scan Content** after changing this so the Links Report counts reflect the exclusions._"
          mode: select
          max_items: null
          create: false

      - handle: excluded_collections
        field:
          type: collections
          display: Exclude Collections
          instructions: "Entries in these collections will be completely excluded from suggestions. Takes effect after re-scanning content."
          mode: select
          max_items: null

      - handle: title_blacklist
        field:
          type: textarea
          display: Title Blacklist
          instructions: |
            **Whole-title match, case-insensitive** — entries whose title equals one of these lines (ignoring upper/lower case and surrounding whitespace) will not be suggested as a link target in any Suggestion Modal. One title per line.

            **What counts as a match:** `Home` filters "home", "HOME", "Home". It does NOT filter "My Home is great" — that's substring, not whole-title. Diacritics still count (`Café` ≠ `Cafe`).

            **Where it acts:** the Suggestion Engine skips matching entries from the TARGET side — they won't appear as link suggestions in any Outbound Suggestion Modal. (They can still HAVE their own outbound suggestions — only being-suggested-to is filtered.)

            **When to use:** if your site has multiple entries with the same generic title (e.g. each collection has its own "Home" or "Untitled draft"). Linkwise would otherwise treat each one as a valid link target whenever those generic words appear in your content.

            **Pattern catches future entries automatically.** If you blacklist `Untitled`, any new entry titled "Untitled" (in any collection) will be skipped without you adding it again.

            **Example:**

            ```
            Home
            Blog
            Welcome
            Untitled
            ```

            **vs. Exclude Entries (above):** that picks specific entries by ID and cascades wider (also skips broken-link checks, auto-link applies, indexer). Use **Exclude Entries** for "this specific 404-page" type cases; use **Title Blacklist** for "every entry with this generic title" patterns.

            _Run **Scan Content** after changing this so the Links Report counts reflect the new blacklist._
          placeholder: |
            Home
            Blog
            Getting Started
            Contact

      - handle: orphaned_ignore
        field:
          type: entries
          display: Ignore from Orphaned Report
          instructions: "These entries won't be flagged as orphaned (e.g. Home, 404 page)."
          mode: select
          max_items: null
          create: false

      - handle: ignored_links
        field:
          type: textarea
          display: Links to Ignore
          instructions: "URL patterns to ignore (one per line). Supports wildcards. These links won't be counted in reports. _Affects the broken-link report — run **Check Links** (in the Broken Links tab) after changing this for the new filter to take effect._"
          placeholder: |
            example.com/*
            /wp-admin/*

  stopwords:
    display: Stopwords
    fields:
      - handle: custom_stopwords
        field:
          type: textarea
          display: Custom Stopwords
          instructions: |
            Additional words Linkwise should treat as filler (one per line). Added on top of the language's built-in stopwords + frequency-list.

            **Why this exists**: every site has its own filler vocabulary the global lists can't predict. A tech blog about "agile" doesn't want "agile" surfacing in every keyword match. A brand-focused site doesn't want their own brand name auto-extracted as a link anchor on every entry.

            **Typical entries**:
            - Your brand/company name (avoids self-anchoring everywhere)
            - Industry jargon that appears in every post but isn't link-worthy ("strategy", "approach", "solution")
            - Recurring author names if multi-author bylines pollute keyword extraction

            Leave empty if the default lists work for your content (most sites). Lowercase, one per line.

            _Affects keyword extraction at index-time — run **Scan Content** after changing this for the new stopwords to take effect._
          placeholder: |
            yourcompany
            brandname

  auto_linking:
    display: Auto-Linking
    fields:
      - handle: auto_apply_on_save_enabled
        field:
          type: toggle
          display: Auto-Apply Rules on Entry Save
          instructions: "When enabled, every active auto-link rule fires automatically each time an entry is saved or created. You can opt-out specific rules in the Auto-Linking tab (per-rule 'Disable auto-apply' checkbox). Off by default."
          default: false

