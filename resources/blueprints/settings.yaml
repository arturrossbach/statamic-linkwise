sections:
  general:
    display: General
    fields:
      - handle: language
        field:
          type: select
          display: 'Content language'
          clearable: true
          instructions: |
            Drives stop-word filtering, stemming, and keyword extraction. Leave empty to auto-detect from Statamic's site locale. "Confident" languages support inflected matching (plurals, conjugations); "Limited" languages match exact word forms only.
          options:
            en: 'English (Confident)'
            de: 'German (Confident)'
            fr: 'French (Confident)'
            es: 'Spanish (Confident)'
            it: 'Italian (Confident)'
            nl: 'Dutch (Confident)'
            pt: 'Portuguese (Confident)'
            sv: 'Swedish (Confident)'
            da: 'Danish (Confident)'
            'no': 'Norwegian (Confident)'
            fi: 'Finnish (Confident)'
            ro: 'Romanian (Confident)'
            ru: 'Russian (Confident)'
            ca: 'Catalan (Confident)'
            hu: 'Hungarian (Limited — exact-match only)'
            pl: 'Polish (Limited — exact-match only)'
            cs: 'Czech (Limited — exact-match only)'
            sk: 'Slovak (Limited — exact-match only)'
            sl: 'Slovenian (Limited — exact-match only)'
            hr: 'Croatian (Limited — exact-match only)'
            bg: 'Bulgarian (Limited — exact-match only)'
            uk: 'Ukrainian (Limited — exact-match only)'
            lv: 'Latvian (Limited — exact-match only)'
            lt: 'Lithuanian (Limited — exact-match only)'
            et: 'Estonian (Limited — exact-match only)'
            ga: 'Irish (Limited — exact-match only)'
            el: 'Greek (Limited — sentence-boundary edge case)'
            tr: 'Turkish (Limited — case-sensitivity edge case)'
          width: 50

      - handle: collections
        field:
          type: collections
          display: Collections to Index
          instructions: "Which collections should Linkwise index for suggestions? Leave empty to index all collections. Takes effect after re-scanning content."
          mode: select
          max_items: null
          width: 50

      - handle: target_collections
        field:
          type: collections
          display: Target Collections
          instructions: "Which collections should suggestions point TO? Leave empty for same as indexed collections."
          mode: select
          max_items: null
          width: 50

      - handle: entry_status
        field:
          type: select
          display: Entry Status
          instructions: "Which entries to include in the index. Takes effect after re-scanning content."
          options:
            published: "Published only"
            all: "All entries (including drafts)"
          default: published
          width: 50

      - handle: max_suggestions
        field:
          type: integer
          display: Max Outbound Suggestions per Entry
          instructions: |
            Caps how many outbound suggestions the engine returns per entry. Affects the **Outbound Suggestion Modal**, the **outbound count badge** in the Links Report table, and the **sidebar suggestion panel** in the entry editor.

            Does **not** affect inbound suggestion counts (those are computed unlimited so the inbound-badge in the Links Report shows true totals).

            **Default 10** is a sane editorial limit — bump to 50–100 if you want every borderline match visible. Higher values mean slightly slower modal loads but more thorough suggestion lists.
          default: 10
          min: 1
          max: 200
          validate:
            - 'integer'
            - 'min:1'
            - 'max:200'
          width: 50

      - handle: open_in_new_tab
        field:
          type: toggle
          display: Open Links in New Tab
          instructions: "Add target=\"_blank\" to inserted links."
          default: false
          width: 50

  matching:
    display: Matching
    fields:
      - handle: min_phrase_words
        field:
          type: integer
          display: Minimum Phrase Words
          instructions: "Minimum number of words a title phrase must have to be considered a match."
          default: 2
          min: 1
          max: 10
          validate:
            - 'integer'
            - 'min:1'
            - 'max:10'
          width: 50

      - handle: min_score
        field:
          type: float
          display: Minimum Title Match Score
          instructions: "Minimum relevance score (0.0 – 1.0) for title-based suggestions. Higher = fewer but better matches."
          default: 0.4
          min: 0
          max: 1
          step: 0.05
          validate:
            - 'numeric'
            - 'min:0'
            - 'max:1'
          width: 50

      - handle: max_keywords_per_entry
        field:
          type: integer
          display: Max Keywords per Entry
          instructions: "Maximum TF-IDF keywords to extract per entry."
          default: 20
          min: 1
          max: 100
          validate:
            - 'integer'
            - 'min:1'
            - 'max:100'
          width: 50

      - handle: min_keyword_score
        field:
          type: float
          display: Minimum Keyword Score
          instructions: |
            How much overlap in top content keywords two entries need to share before Linkwise suggests a link between them (0.0–1.0). Higher = stricter, fewer but cleaner suggestions; lower = more suggestions including borderline matches.

            **Reference values:**
            - `0.05` — very permissive, expect lots of weak suggestions
            - `0.15` — default, balanced signal-to-noise
            - `0.50` — strict, only entries clearly sharing the same topic
            - `0.80+` — usually too strict, often zero suggestions

            **Example:** at `0.15`, two entries must share ~15 % of their weighted top-keywords (e.g. both score high on "database", "index", "postgres") to suggest a link.

            **Heads-up — when changes take effect:**
            - **Suggestion Modal** (click the count badge) — filtered live with the current threshold, no rescan needed.
            - **Outbound count badge** in the Links Report table — cached in the index, only updates after **Scan Content**.

            Requires **Enable Keyword-Overlap Suggestions** below to be ON — otherwise this threshold has no effect.
          default: 0.15
          min: 0
          max: 1
          step: 0.05
          validate:
            - 'numeric'
            - 'min:0'
            - 'max:1'
          width: 50

      - handle: enable_keyword_matches
        field:
          type: toggle
          display: Enable Keyword-Overlap Suggestions
          instructions: |
            Off by default — Linkwise only suggests links where titles or custom keywords match. Turn ON to also surface suggestions based on TF-IDF content-keyword overlap (controlled by **Minimum Keyword Score** above).

            **Trade-off:** more suggestions (often the ones you wanted), but also more borderline matches. Turn this on if you're seeing very few suggestions and your content is thematically diverse.

            **After toggling, run Scan Content (header button)** so the Outbound count badges in Links Report reflect the new behavior. The Suggestion Modal itself updates live without a rescan.
          default: false
          width: 50

      - handle: prevent_two_way
        field:
          type: toggle
          display: Prevent Two-Way Linking
          instructions: "If entry A links to entry B, don't suggest linking B to A."
          default: false
          width: 50

  exclusions:
    display: Exclusions
    fields:
      - handle: excluded_entries
        field:
          type: entries
          display: Exclude Entries
          instructions: "These entries will be excluded from all suggestions (neither suggested nor suggesting)."
          mode: select
          max_items: null
          create: false

      - handle: excluded_collections
        field:
          type: collections
          display: Exclude Collections
          instructions: "Entries in these collections will be completely excluded from suggestions. Takes effect after re-scanning content."
          mode: select
          max_items: null

      - handle: title_blacklist
        field:
          type: textarea
          display: Title Blacklist
          instructions: "Titles to ignore for matching (one per line). Short or generic titles like 'Home' or 'Blog' cause false positives."
          placeholder: |
            Home
            Blog
            Getting Started
            Contact

      - handle: orphaned_ignore
        field:
          type: entries
          display: Ignore from Orphaned Report
          instructions: "These entries won't be flagged as orphaned (e.g. Home, 404 page)."
          mode: select
          max_items: null
          create: false

      - handle: ignored_links
        field:
          type: textarea
          display: Links to Ignore
          instructions: "URL patterns to ignore (one per line). Supports wildcards. These links won't be counted in reports."
          placeholder: |
            example.com/*
            /wp-admin/*

  stopwords:
    display: Stopwords
    fields:
      - handle: custom_stopwords
        field:
          type: textarea
          display: Custom Stopwords
          instructions: "Additional stopwords to filter out (one per line). These are added to the language defaults."
          placeholder: |
            yourcompany
            brandname

  auto_linking:
    display: Auto-Linking
    fields:
      - handle: auto_apply_on_save_enabled
        field:
          type: toggle
          display: Auto-Apply Rules on Entry Save
          instructions: "When enabled, every active auto-link rule fires automatically each time an entry is saved or created. You can opt-out specific rules in the Auto-Linking tab (per-rule 'Disable auto-apply' checkbox). Off by default."
          default: false

